<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Silent Madness App Concept</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="studio-shell">
      <aside class="screen-rail" aria-label="Prototype screens">
        <div>
          <p class="rail-kicker">Mobile Concept</p>
          <img class="rail-logo" src="./assets/silent-madness-logo.png" alt="Silent Madness" />
          <p>Dark motivation for people who laugh at the chaos.</p>
        </div>
        <nav id="screenNav" class="screen-nav"></nav>
      </aside>

      <section class="phone-stage" aria-label="Mobile app preview">
        <div class="phone-device">
          <div class="phone-bezel">
            <div class="phone-speaker"></div>
            <div id="app" class="app-screen"></div>
          </div>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
